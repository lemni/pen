name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      e2e: ${{ steps.filter.outputs.e2e }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Detect e2e-relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            e2e:
              - '.github/workflows/ci.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'playwright.config.ts'
              - 'playground/**'
              - 'packages/core/**'
              - 'packages/crdt/yjs/**'
              - 'packages/extensions/undo/**'
              - 'packages/rendering/react/**'
              - 'packages/schema/default/**'
              - 'packages/types/**'

  validate:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint repository surfaces
        run: pnpm lint

      - name: Build packages
        run: pnpm build

      - name: Typecheck packages
        run: pnpm typecheck

      - name: Run unit and integration tests
        run: pnpm test

  e2e:
    needs: changes
    if: ${{ needs.changes.outputs.e2e == 'true' }}
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run browser end-to-end tests
        run: pnpm test:e2e

      - name: Upload Playwright artifacts
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
